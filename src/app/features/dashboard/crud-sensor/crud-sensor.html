<div class="flex justify-between mb-6">
  <h1 class="text-2xl font-bold">Sensores</h1>

  <button
    type="button"
    (click)="toggleForm()"
    class="bg-emerald-600 text-white px-4 py-2 rounded-xl">
    + Novo Sensor
  </button>
</div>

@if (showForm()) {
  <form
    [formGroup]="form"
    (ngSubmit)="salvar()"
    class="bg-white p-6 rounded-xl shadow grid grid-cols-2 gap-4 mb-6">

    <input class="input" placeholder="Serial" formControlName="serialNumber">
    <input class="input" placeholder="Fabricante" formControlName="fabricante">
    <input class="input" placeholder="Modelo" formControlName="modelo">
    <input class="input" placeholder="Tipo" formControlName="tipo">

    <select class="input" formControlName="status">
      <option value="" disabled>Status</option>
      @for (s of statusList; track s) {
        <option [value]="s">{{ s }}</option>
      }
    </select>

    <select class="input" formControlName="areaId">
      <option value="" disabled>Área</option>
      @for (a of areas(); track a.id) {
        <option [value]="a.id">{{ a.nome }}</option>
      }
    </select>

    <input type="number" class="input" placeholder="Latitude" formControlName="latitude">
    <input type="number" class="input" placeholder="Longitude" formControlName="longitude">
    <input type="number" class="input" placeholder="Ciclo (s)" formControlName="cicloLeitura">
    <input
    type="date"
    class="input"
    formControlName="dataInstalacao"
    >

    <div class="col-span-2 flex gap-3">
      <button
        type="submit"
        class="bg-emerald-600 text-white px-4 py-2 rounded-xl">
        Salvar
      </button>

      <button
        type="button"
        (click)="toggleForm()">
        Cancelar
      </button>
    </div>
  </form>
}

<table class="bg-white w-full rounded-xl shadow">
  <thead>
    <tr class="bg-slate-100">
      <th class="p-3">Serial</th>
      <th>Status</th>
      <th>Área</th>
    </tr>
  </thead>

  <tbody>
    @for (s of sensores(); track s.id) {
      <tr class="border-t">
        <td class="p-3">{{ s.serialNumber }}</td>
        <td>{{ s.status }}</td>
        <td>{{ s.area?.nome }}</td>
      </tr>
    }
  </tbody>
</table>
